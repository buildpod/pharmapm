<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmaPM Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0B0F19;font-family:'DM Sans',system-ui,sans-serif;color:#F9FAFB;overflow:hidden}
#root{height:100vh}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#111827}
::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
input{font-family:inherit}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#06B6D4;font-size:14px">Loading PharmaPM Pro...</div></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script type="text/babel">
const {useState,useMemo,Fragment}=React;
const {BarChart,Bar,XAxis,YAxis,ResponsiveContainer,Cell}=Recharts;
const C={bg:"#0B0F19",sb:"#111827",cd:"#1A1F2E",sf:"#0F1420",bd:"#1F2937",tx:"#F9FAFB",tm:"#9CA3AF",td:"#6B7280",ac:"#06B6D4",al:"#22D3EE",gn:"#10B981",gnB:"rgba(16,185,129,0.12)",am:"#F59E0B",amB:"rgba(245,158,11,0.12)",rd:"#EF4444",rdB:"rgba(239,68,68,0.12)",bl:"#3B82F6",blB:"rgba(59,130,246,0.12)",pu:"#8B5CF6",tl:"#14B8A6"};
const P={name:"Project Helix",sub:"Veeva RIM Implementation",sponsor:"Dr. Sarah Mueller",pm:"Vineet Pathak",sys:"Veeva RIM",meth:"Hybrid (V-Model + Agile)",goLive:"2026-12-15",budget:{total:537000,used:28500}};
const MODS=[{n:"RIM Submissions",l:"High",c:"High"},{n:"RIM Registrations",l:"High",c:"Medium"},{n:"RIM Publishing",l:"Medium",c:"Medium"},{n:"RIM Submissions Archive",l:"Low",c:"Low"}];
const INTS=[{n:"Clinical Docs → RIM",s:"Vault Clinical",t:"Vault RIM",ty:"Cross-Vault",mw:"Vault Connector",cx:"Medium"},{n:"QMS Change Impact",s:"Vault Quality",t:"Vault RIM",ty:"Cross-Vault",mw:"Vault Connector",cx:"Low"},{n:"Safety Labeling",s:"Vault Safety",t:"Vault RIM",ty:"Cross-Vault",mw:"Vault Connector",cx:"Medium"},{n:"Product Master Data",s:"SAP ERP",t:"Vault RIM",ty:"External API",mw:"MuleSoft",cx:"High"},{n:"eCTD Submission",s:"Vault RIM",t:"FDA ESG / EMA",ty:"External API",mw:"Direct API",cx:"High"}];
const WS=[{id:"WS-1",n:"PM & Governance",ld:"Vineet Pathak",p:35},{id:"WS-2",n:"Business Process Design",ld:"Thomas Richter",p:20},{id:"WS-3",n:"Technical Configuration",ld:"James Wilson",p:10},{id:"WS-4",n:"Validation & Qualification",ld:"Anna Schmidt",p:25},{id:"WS-5",n:"Data/Document Migration",ld:"Maria Lopez",p:15},{id:"WS-6",n:"Integration Development",ld:"Raj Patel",p:5},{id:"WS-7",n:"Training & Change Mgmt",ld:"",p:0},{id:"WS-8",n:"Decommissioning",ld:"",p:0},{id:"WS-9",n:"Go-Live & Hypercare",ld:"",p:0}];
const MS=[{id:1,ph:"Requirements",n:"URS Approved",ow:"Anna Schmidt",pl:"2026-06-15",st:"In Progress",pct:60,pr:null},{id:2,ph:"Requirements",n:"Val Plan Approved",ow:"Anna Schmidt",pl:"2026-06-30",st:"Not Started",pct:0,pr:1},{id:3,ph:"Design",n:"FS/DS Complete",ow:"James Wilson",pl:"2026-07-31",st:"Not Started",pct:0,pr:1},{id:4,ph:"Design",n:"Integration Specs",ow:"Raj Patel",pl:"2026-07-31",st:"Not Started",pct:0,pr:3},{id:5,ph:"Build Sprint 1",n:"Core Config",ow:"James Wilson",pl:"2026-08-15",st:"Not Started",pct:0,pr:3},{id:6,ph:"Build Sprint 2",n:"Reg + Publishing",ow:"James Wilson",pl:"2026-08-31",st:"Not Started",pct:0,pr:5},{id:7,ph:"Build Sprint 3",n:"Integration Build",ow:"Raj Patel",pl:"2026-09-30",st:"Not Started",pct:0,pr:4},{id:8,ph:"Migration",n:"Migration Spec",ow:"Maria Lopez",pl:"2026-07-31",st:"Not Started",pct:0,pr:1},{id:9,ph:"Migration",n:"Migration Exec",ow:"Maria Lopez",pl:"2026-10-15",st:"Not Started",pct:0,pr:8},{id:10,ph:"Qualification",n:"IQ/OQ Executed",ow:"Anna Schmidt",pl:"2026-10-15",st:"Not Started",pct:0,pr:7},{id:11,ph:"Qualification",n:"PQ/UAT",ow:"Anna Schmidt",pl:"2026-11-15",st:"Not Started",pct:0,pr:10},{id:12,ph:"Go-Live",n:"GO-LIVE",ow:"Vineet Pathak",pl:"2026-12-15",st:"Not Started",pct:0,pr:11}];
const RK=[{id:"R-001",cat:"Vendor",d:"Veeva PS resource contention Aug-Oct",p:3,i:4,res:"Mitigate",ow:"Vineet Pathak",st:"Open",uf:false},{id:"R-002",cat:"Technical",d:"Legacy Documentum data quality issues",p:4,i:4,res:"Mitigate",ow:"Maria Lopez",st:"Open",uf:false},{id:"R-003",cat:"Technical",d:"MuleSoft middleware latency",p:3,i:3,res:"Mitigate",ow:"Raj Patel",st:"Open",uf:false},{id:"R-004",cat:"Regulatory",d:"HA Gateway spec change (eCTD 4.0)",p:2,i:5,res:"Avoid",ow:"Raj Patel",st:"Open",uf:false},{id:"R-005",cat:"Resource",d:"Reg Ops SMEs unavailable",p:4,i:3,res:"Mitigate",ow:"Thomas Richter",st:"Open",uf:false},{id:"R-006",cat:"Scope",d:"Cross-Vault scope expand (Safety)",p:3,i:3,res:"Accept",ow:"",st:"Open",uf:true}];
const VN=[{n:"Veeva Professional Services",ty:"Implementation",h:800,u:120,r:200},{n:"QualityOne Consulting",ty:"Validation",h:400,u:30,r:150},{n:"IntegrationHub GmbH",ty:"Integration",h:300,u:0,r:190},{n:"DataMigrate Ltd",ty:"Migration",h:200,u:0,r:175}];
const DOCS=[{id:"DOC-001",n:"Project Plan",cat:"Core",st:"In Draft",ow:"Vineet"},{id:"DOC-002",n:"Risk Assessment",cat:"Core",st:"In Draft",ow:"Vineet"},{id:"DOC-003",n:"Validation Plan",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-004",n:"URS",cat:"Validation",st:"In Draft",ow:"Anna"},{id:"DOC-005",n:"Functional Spec",cat:"Validation",st:"Not Started",ow:"James"},{id:"DOC-006",n:"Design Spec",cat:"Validation",st:"Not Started",ow:"James"},{id:"DOC-007",n:"IQ Protocol",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-008",n:"OQ Protocol",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-009",n:"PQ Protocol",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-010",n:"Traceability Matrix",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-011",n:"Val Summary Report",cat:"Validation",st:"Not Started",ow:"Anna"},{id:"DOC-012",n:"Migration Plan",cat:"Migration",st:"Not Started",ow:"Maria"},{id:"DOC-013",n:"Migration Spec",cat:"Migration",st:"Not Started",ow:"Maria"},{id:"DOC-014",n:"Int Spec - SAP",cat:"Integration",st:"Not Started",ow:"Raj"},{id:"DOC-015",n:"Int Spec - HA Gateway",cat:"Integration",st:"Not Started",ow:"Raj"},{id:"DOC-016",n:"Int Spec - Clinical",cat:"Integration",st:"Not Started",ow:"Raj"},{id:"DOC-017",n:"Int Spec - QMS",cat:"Integration",st:"Not Started",ow:"Raj"},{id:"DOC-018",n:"Int Spec - Safety",cat:"Integration",st:"Not Started",ow:"Raj"},{id:"DOC-019",n:"Decom Plan",cat:"Decommission",st:"Not Started",ow:""},{id:"DOC-020",n:"Vendor Assessment",cat:"Vendor",st:"Not Started",ow:"Anna"},{id:"DOC-021",n:"Test Plan",cat:"Core",st:"Not Started",ow:"Anna"},{id:"DOC-022",n:"Training Plan",cat:"Core",st:"Not Started",ow:""},{id:"DOC-023",n:"Go-Live Checklist",cat:"Core",st:"Not Started",ow:"Vineet"}];
const TK=[{id:"T-001",ms:"URS",n:"Draft URS",a:"Anna Schmidt",ws:"WS-4",pri:"Critical",st:"In Progress",est:80,act:45},{id:"T-002",ms:"URS",n:"URS Review",a:"Thomas Richter",ws:"WS-2",pri:"High",st:"Not Started",est:16,act:0},{id:"T-003",ms:"Val Plan",n:"Draft Validation Plan",a:"Anna Schmidt",ws:"WS-4",pri:"High",st:"Not Started",est:40,act:0},{id:"T-004",ms:"FS/DS",n:"FS - Submissions",a:"James Wilson",ws:"WS-3",pri:"High",st:"Not Started",est:60,act:0},{id:"T-005",ms:"Int Specs",n:"Int Spec - SAP",a:"Raj Patel",ws:"WS-6",pri:"High",st:"Not Started",est:30,act:0},{id:"T-006",ms:"Int Specs",n:"Int Spec - HA Gateway",a:"Raj Patel",ws:"WS-6",pri:"High",st:"Not Started",est:40,act:0},{id:"T-007",ms:"Int Specs",n:"Int Spec - Cross-Vault",a:"Raj Patel",ws:"WS-6",pri:"Medium",st:"Not Started",est:45,act:0},{id:"T-008",ms:"Migration",n:"Legacy Data Inventory",a:"Maria Lopez",ws:"WS-5",pri:"Critical",st:"Not Started",est:50,act:0},{id:"T-009",ms:"Int Build",n:"MuleSoft Flow - SAP",a:"Raj Patel",ws:"WS-6",pri:"Critical",st:"Not Started",est:40,act:0},{id:"T-010",ms:"Training",n:"Training Materials",a:"",ws:"WS-7",pri:"Medium",st:"Not Started",est:60,act:0}];

const Bd=({children,color=C.ac})=><span style={{display:"inline-flex",padding:"2px 7px",borderRadius:4,fontSize:10,fontWeight:600,color,background:color+"18",border:"1px solid "+color+"30"}}>{children}</span>;
const PB=({v,color=C.ac,h=6,label})=><div style={{display:"flex",alignItems:"center",gap:6,width:"100%"}}><div style={{flex:1,height:h,background:color+"15",borderRadius:h,overflow:"hidden"}}><div style={{width:Math.min(100,v)+"%",height:"100%",background:color,borderRadius:h,transition:"width .6s ease"}}/></div>{label&&<span style={{fontSize:10,color:C.tm,minWidth:28}}>{v}%</span>}</div>;
const SB=({s})=>{const m={"In Progress":C.bl,"Complete":C.gn,"Not Started":C.td,"Delayed":C.am,"Blocked":C.rd,"Open":C.am,"In Draft":C.bl,"Approved":C.gn};return<Bd color={m[s]||C.td}>{s}</Bd>};
const KPI=({label,value,sub,color=C.ac})=><div style={{background:C.cd,borderRadius:12,padding:"16px 18px",border:"1px solid "+C.bd}}><div style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:1.2,fontWeight:700,marginBottom:6}}>{label}</div><div style={{fontSize:26,fontWeight:800,color:C.tx,letterSpacing:-1,lineHeight:1}}>{value}</div>{sub&&<div style={{fontSize:10,color:C.tm,marginTop:4}}>{sub}</div>}</div>;
const Sec=({title,color=C.ac,children})=><div style={{background:C.cd,borderRadius:12,padding:20,border:"1px solid "+C.bd}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,paddingBottom:10,borderBottom:"1px solid "+C.bd}}><div style={{width:6,height:6,borderRadius:"50%",background:color}}/><span style={{fontSize:14,fontWeight:700,color:C.tx}}>{title}</span></div>{children}</div>;
const Th=({children})=><th style={{padding:"6px 8px",textAlign:"left",fontSize:9,color:C.td,textTransform:"uppercase",letterSpacing:1,borderBottom:"2px solid "+C.bd,fontWeight:700}}>{children}</th>;
const Td=({children,fw,c})=><td style={{padding:"8px",fontSize:11,color:c||C.tm,fontWeight:fw||400}}>{children}</td>;

const Dashboard=({health,days})=>{const bp=Math.round(P.budget.used/P.budget.total*100);const md=MS.map(m=>({name:m.n.length>15?m.n.slice(0,15)+"..":m.n,pct:m.pct}));const sr=[...RK].sort((a,b)=>(b.p*b.i)-(a.p*a.i));return<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{display:"flex",gap:14,flexWrap:"wrap"}}><div style={{flex:"1 1 260px",background:health.bg,borderRadius:14,padding:22,border:"1px solid "+health.color+"30",display:"flex",alignItems:"center",gap:16}}><div style={{width:56,height:56,borderRadius:"50%",background:health.color+"20",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 0 24px "+health.color+"20",fontSize:24}}>⚡</div><div><div style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Overall Health</div><div style={{fontSize:28,fontWeight:900,color:health.color,letterSpacing:-1}}>{health.label}</div></div></div><div style={{flex:"1 1 180px",background:C.cd,borderRadius:14,padding:22,border:"1px solid "+C.bd,display:"flex",alignItems:"center",gap:16}}><div style={{width:56,height:56,borderRadius:"50%",background:C.ac+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>⏱</div><div><div style={{fontSize:10,color:C.td,textTransform:"uppercase",letterSpacing:1.5,fontWeight:700}}>Go-Live</div><div style={{fontSize:28,fontWeight:900,color:C.tx,letterSpacing:-1}}>{days}<span style={{fontSize:14,fontWeight:400,color:C.tm}}> days</span></div></div></div></div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}><KPI label="Milestones" value={"0/"+MS.length} sub="completed" color={C.ac}/><KPI label="Tasks" value={"1/"+TK.length} sub="in progress" color={C.bl}/><KPI label="Open Risks" value={RK.filter(r=>r.st==="Open").length} sub={RK.filter(r=>r.p*r.i>=15).length+" critical"} color={C.rd}/><KPI label="Budget" value={bp+"%"} sub={"€"+(P.budget.used/1000).toFixed(0)+"K / €"+(P.budget.total/1000).toFixed(0)+"K"} color={C.gn}/><KPI label="Documents" value={"0/"+DOCS.length} sub="approved" color={C.pu}/><KPI label="Integrations" value="5" sub="mapped" color={C.tl}/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><Sec title="Workstream Progress" color={C.ac}>{WS.map(w=><div key={w.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{fontSize:9,color:C.ac,minWidth:32,fontWeight:800}}>{w.id}</span><PB v={w.p} color={w.p>0?C.ac:C.td} h={7}/><span style={{fontSize:10,color:C.tm,minWidth:28}}>{w.p}%</span></div>)}</Sec>
<Sec title="Milestone Status" color={C.bl}><ResponsiveContainer width="100%" height={200}><BarChart data={md} layout="vertical" margin={{left:0,right:8}}><XAxis type="number" domain={[0,100]} tick={{fill:C.td,fontSize:9}} axisLine={false} tickLine={false}/><YAxis type="category" dataKey="name" width={110} tick={{fill:C.tm,fontSize:9}} axisLine={false} tickLine={false}/><Bar dataKey="pct" radius={[0,4,4,0]}>{md.map((e,i)=><Cell key={i} fill={e.pct>=100?C.gn:e.pct>0?C.ac:C.td+"30"}/>)}</Bar></BarChart></ResponsiveContainer></Sec></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><Sec title="Top Risks" color={C.rd}>{sr.slice(0,5).map(r=>{const sc=r.p*r.i;const scC=sc>=15?C.rd:sc>=8?C.am:C.gn;return<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 8px",borderRadius:6,borderLeft:r.uf?"3px solid #F97316":"3px solid transparent",background:r.uf?"rgba(249,115,22,0.06)":"transparent",marginBottom:4}}><div style={{minWidth:28,height:28,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:scC+"18",fontWeight:800,fontSize:13,color:scC}}>{sc}</div><div style={{flex:1}}><div style={{fontSize:11,color:C.tx,fontWeight:500}}>{r.d}</div><div style={{fontSize:9,color:C.td}}>{r.ow||"Unassigned"}</div></div></div>})}</Sec>
<Sec title="Vendor Burn Rate" color={C.am}>{VN.map((v,i)=>{const burn=v.h>0?Math.round(v.u/v.h*100):0;const bc=burn>20?C.rd:burn>10?C.am:C.gn;return<div key={i} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:11,color:C.tx,fontWeight:500}}>{v.n}</span><span style={{fontSize:11,color:bc,fontWeight:700}}>{burn}%</span></div><PB v={burn} color={bc} h={5}/><div style={{fontSize:9,color:C.td,marginTop:1}}>{v.u}/{v.h} hrs</div></div>})}</Sec></div>
</div>};

const Setup=()=><div style={{display:"flex",flexDirection:"column",gap:16}}>
<Sec title="Project Details" color={C.bl}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>{Object.entries({Project:P.name,System:P.sys,Methodology:P.meth,Sponsor:P.sponsor,PM:P.pm,"Go-Live":P.goLive}).map(([k,v])=><div key={k}><div style={{fontSize:9,color:C.td,textTransform:"uppercase",letterSpacing:1,fontWeight:700,marginBottom:3}}>{k}</div><div style={{padding:"7px 10px",background:"rgba(255,255,255,0.03)",borderRadius:6,border:"1px solid "+C.bd,fontSize:12,color:C.tx,fontWeight:500}}>{v}</div></div>)}</div></Sec>
<Sec title="Modules - GxP Impact" color={C.pu}>{MODS.map((m,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderTop:i?"1px solid "+C.bd:"none"}}><span style={{flex:1,fontSize:12,color:C.tx,fontWeight:500}}>{m.n}</span><Bd color={C.am}>GxP</Bd><Bd color={m.l==="High"?C.rd:m.l==="Medium"?C.am:C.gn}>{m.l}</Bd><Bd color={m.c==="High"?C.rd:m.c==="Medium"?C.am:C.gn}>{m.c}</Bd></div>)}</Sec>
<Sec title="Integration Map" color={C.tl}>{INTS.map((t,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderTop:i?"1px solid "+C.bd:"none"}}><div style={{flex:1}}><div style={{fontSize:12,color:C.tx,fontWeight:600}}>{t.n}</div><div style={{fontSize:10,color:C.td}}><span style={{color:C.ac}}>{t.s}</span>{" → "}<span style={{color:C.al}}>{t.t}</span></div></div><Bd color={C.tl}>{t.ty}</Bd><Bd color={C.bl}>{t.mw}</Bd><Bd color={t.cx==="High"?C.rd:t.cx==="Medium"?C.am:C.gn}>{t.cx}</Bd></div>)}</Sec>
<Sec title="Workstreams" color={C.ac}>{WS.map(w=><div key={w.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:6,marginBottom:4,border:"1px solid "+C.bd}}><span style={{fontSize:10,fontWeight:800,color:C.ac,minWidth:32}}>{w.id}</span><span style={{flex:1,fontSize:12,color:C.tx,fontWeight:500}}>{w.n}</span><span style={{fontSize:11,color:C.tm,minWidth:110}}>{w.ld||"—"}</span><Bd color={C.gn}>Active</Bd></div>)}</Sec>
</div>;

const Milestones=()=><div style={{display:"flex",flexDirection:"column",gap:16}}>
<Sec title="Timeline" color={C.ac}><div style={{display:"flex",alignItems:"center",gap:2,padding:"12px 0",overflowX:"auto"}}>{MS.map((m,i)=>{const color=m.st==="Complete"?C.gn:m.st==="In Progress"?C.bl:C.td;return<Fragment key={m.id}><div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:52}}><div style={{width:24,height:24,borderRadius:"50%",background:color+"20",border:"2px solid "+color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:color}}>{m.pct>0?m.pct:m.id}</div><div style={{fontSize:7,color:C.td,marginTop:3,textAlign:"center",maxWidth:52,lineHeight:1.1}}>{m.n}</div></div>{i<MS.length-1&&<div style={{width:16,height:2,background:C.td+"30",marginBottom:14}}/>}</Fragment>})}</div></Sec>
<Sec title="All Milestones" color={C.am}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["#","Phase","Milestone","Owner","Planned","Status","Progress","Dep."].map(h=><Th key={h}>{h}</Th>)}</tr></thead><tbody>{MS.map(m=><tr key={m.id} style={{borderBottom:"1px solid "+C.bd,background:m.n==="GO-LIVE"?C.am+"06":"transparent"}}><Td fw={700} c={C.td}>{m.id}</Td><Td c={C.ac}>{m.ph}</Td><Td fw={m.n==="GO-LIVE"?800:500} c={C.tx}>{m.n}</Td><Td>{m.ow}</Td><Td>{m.pl}</Td><td style={{padding:8}}><SB s={m.st}/></td><td style={{padding:8,width:100}}><PB v={m.pct} color={m.pct>0?C.ac:C.td} h={5} label/></td><Td c={C.td}>{m.pr?"MS-"+m.pr:"—"}</Td></tr>)}</tbody></table></Sec>
</div>;

const Tasks=()=>{const[f,setF]=useState("all");const fl=f==="all"?TK:TK.filter(t=>t.ws===f);const wl=[...new Set(TK.map(t=>t.ws))];return<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}><span onClick={()=>setF("all")} style={{cursor:"pointer"}}><Bd color={f==="all"?C.ac:C.td}>All ({TK.length})</Bd></span>{wl.map(w=><span key={w} onClick={()=>setF(w)} style={{cursor:"pointer"}}><Bd color={f===w?C.ac:C.td}>{w}</Bd></span>)}</div>
<Sec title={"Tasks "+(f!=="all"?"("+f+")":"")} color={C.bl}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["ID","Milestone","Task","Assignee","WS","Priority","Status","Est","Act"].map(h=><Th key={h}>{h}</Th>)}</tr></thead><tbody>{fl.map(t=><tr key={t.id} style={{borderBottom:"1px solid "+C.bd}}><Td fw={700} c={C.td}>{t.id}</Td><Td c={C.ac}>{t.ms}</Td><Td fw={500} c={C.tx}>{t.n}</Td><Td>{t.a||"—"}</Td><td style={{padding:8}}><Bd color={C.tl}>{t.ws}</Bd></td><td style={{padding:8}}><Bd color={t.pri==="Critical"?C.rd:t.pri==="High"?C.am:C.gn}>{t.pri}</Bd></td><td style={{padding:8}}><SB s={t.st}/></td><Td>{t.est}h</Td><Td fw={t.act>0?600:400} c={t.act>0?C.tx:C.td}>{t.act}h</Td></tr>)}</tbody></table></Sec>
</div>};

const Risks=()=>{const hm=Array(5).fill(null).map(()=>Array(5).fill(null).map(()=>[]));RK.forEach(r=>{hm[4-(r.i-1)][r.p-1].push(r)});const sr=[...RK].sort((a,b)=>(b.p*b.i)-(a.p*a.i));return<div style={{display:"flex",flexDirection:"column",gap:16}}>
<Sec title="Risk Heat Map" color={C.rd}><div style={{display:"grid",gridTemplateColumns:"30px repeat(5,1fr)",gap:3}}><div/>{["VL","L","M","H","VH"].map(l=><div key={l} style={{textAlign:"center",fontSize:8,color:C.td,fontWeight:700,padding:3}}>{l}</div>)}{hm.map((row,ri)=><Fragment key={ri}><div style={{fontSize:8,color:C.td,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{["VH","H","M","L","VL"][ri]}</div>{row.map((cell,ci)=>{const sc=(ci+1)*(5-ri);const bg=sc>=15?C.rd+"20":sc>=8?C.am+"15":C.gn+"10";return<div key={ci} style={{background:bg,borderRadius:6,minHeight:40,display:"flex",flexWrap:"wrap",gap:3,padding:4,alignItems:"center",justifyContent:"center",border:"1px solid "+C.bd}}>{cell.map(r=><div key={r.id} title={r.d} style={{width:18,height:18,borderRadius:"50%",background:r.uf?"#F97316":sc>=15?C.rd:sc>=8?C.am:C.gn,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,color:"#fff",cursor:"pointer"}}>{r.id.slice(-1)}</div>)}</div>})}</Fragment>)}</div></Sec>
<Sec title="Risk Register" color={C.am}>{sr.map(r=>{const sc=r.p*r.i;const scC=sc>=15?C.rd:sc>=8?C.am:C.gn;return<div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:12,borderRadius:8,marginBottom:6,background:r.uf?"rgba(249,115,22,0.05)":C.bg+"80",border:"1px solid "+(r.uf?"rgba(249,115,22,0.2)":C.bd),borderLeft:"4px solid "+(r.uf?"#F97316":scC)}}><div style={{minWidth:40,textAlign:"center"}}><div style={{fontSize:20,fontWeight:900,color:scC}}>{sc}</div><div style={{fontSize:7,color:C.td}}>{r.p}x{r.i}</div></div><div style={{flex:1}}><div style={{display:"flex",gap:6,marginBottom:3}}><span style={{fontSize:9,fontWeight:700,color:C.td}}>{r.id}</span><Bd color={C.ac}>{r.cat}</Bd>{r.uf&&<Bd color="#F97316">Unforeseen</Bd>}</div><div style={{fontSize:12,color:C.tx,fontWeight:500}}>{r.d}</div><div style={{fontSize:10,color:C.td,marginTop:2}}>Owner: {r.ow||"Unassigned"} | {r.res}</div></div><SB s={r.st}/></div>})}</Sec>
</div>};

const Documents=()=>{const[cf,setCf]=useState("all");const cats=[...new Set(DOCS.map(d=>d.cat))];const fl=cf==="all"?DOCS:DOCS.filter(d=>d.cat===cf);return<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{display:"flex",alignItems:"center",gap:12}}><span style={{fontSize:13,color:C.tx,fontWeight:700}}>Readiness: 0/{DOCS.length} approved</span><div style={{width:200}}><PB v={0} color={C.gn} h={8} label/></div></div>
<div style={{display:"flex",gap:4,flexWrap:"wrap"}}><span onClick={()=>setCf("all")} style={{cursor:"pointer"}}><Bd color={cf==="all"?C.ac:C.td}>All ({DOCS.length})</Bd></span>{cats.map(c=><span key={c} onClick={()=>setCf(c)} style={{cursor:"pointer"}}><Bd color={cf===c?C.ac:C.td}>{c} ({DOCS.filter(d=>d.cat===c).length})</Bd></span>)}</div>
<Sec title="Document Checklist" color={C.pu}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["ID","Document","Category","Owner","Status"].map(h=><Th key={h}>{h}</Th>)}</tr></thead><tbody>{fl.map(d=><tr key={d.id} style={{borderBottom:"1px solid "+C.bd}}><Td fw={700} c={C.td}>{d.id}</Td><Td fw={500} c={C.tx}>{d.n}</Td><td style={{padding:8}}><Bd color={C.tl}>{d.cat}</Bd></td><Td>{d.ow||"—"}</Td><td style={{padding:8}}><SB s={d.st}/></td></tr>)}</tbody></table></Sec>
</div>};

const Costs=()=>{const b=P.budget;return<div style={{display:"flex",flexDirection:"column",gap:16}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><KPI label="Total Budget" value={"€"+(b.total/1000).toFixed(0)+"K"} color={C.ac}/><KPI label="Consumed" value={"€"+(b.used/1000).toFixed(1)+"K"} sub={Math.round(b.used/b.total*100)+"%"} color={C.am}/><KPI label="Remaining" value={"€"+((b.total-b.used)/1000).toFixed(0)+"K"} color={C.gn}/></div>
<Sec title="Vendor Detail" color={C.am}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Vendor","Type","Hours","Used","Burn %","Cost","RAG"].map(h=><Th key={h}>{h}</Th>)}</tr></thead><tbody>{VN.map((v,i)=>{const burn=v.h>0?Math.round(v.u/v.h*100):0;const bc=burn>20?C.rd:burn>10?C.am:C.gn;return<tr key={i} style={{borderBottom:"1px solid "+C.bd}}><Td fw={500} c={C.tx}>{v.n}</Td><td style={{padding:8}}><Bd color={C.bl}>{v.ty}</Bd></td><Td>{v.h}</Td><Td fw={600} c={C.tx}>{v.u}</Td><td style={{padding:8,width:90}}><PB v={burn} color={bc} h={5} label/></td><Td fw={600} c={C.tx}>{"€"+(v.u*v.r).toLocaleString()}</Td><td style={{padding:8}}><span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:bc,boxShadow:"0 0 8px "+bc+"40"}}/></td></tr>})}</tbody></table></Sec>
</div>};

const SteerCo=({health,days})=>{const bp=Math.round(P.budget.used/P.budget.total*100);const sr=[...RK].sort((a,b)=>(b.p*b.i)-(a.p*a.i));return<div style={{background:C.cd,borderRadius:14,padding:28,border:"1px solid "+C.bd,maxWidth:860}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:20}}><div><h2 style={{margin:0,fontSize:20,fontWeight:800,color:C.tx}}>Steering Committee Report</h2><div style={{fontSize:12,color:C.tm,marginTop:2}}>{P.name} — {P.sub}</div></div><div style={{textAlign:"right"}}><div style={{padding:"4px 14px",borderRadius:6,background:health.bg,border:"1px solid "+health.color+"30",color:health.color,fontWeight:800,fontSize:13}}>{health.label}</div><div style={{fontSize:10,color:C.td,marginTop:3}}>{new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div></div></div>
<div style={{background:C.rd+"08",borderRadius:10,padding:16,marginBottom:20,border:"1px solid "+C.rd+"20"}}><div style={{fontSize:11,fontWeight:700,color:C.rd,textTransform:"uppercase",letterSpacing:.8,marginBottom:10}}>Decisions Needed</div>{[1,2,3].map(i=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}><span style={{minWidth:20,height:20,borderRadius:4,background:C.rd+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:C.rd}}>{i}</span><input style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid "+C.bd,borderRadius:4,padding:"5px 8px",color:C.tx,fontSize:11,outline:"none"}} placeholder="Enter decision..."/></div>)}</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>{[{l:"Milestones",v:"0/"+MS.length},{l:"Risks",v:RK.filter(r=>r.st==="Open").length},{l:"Budget",v:bp+"%"},{l:"Days Left",v:days}].map((m,i)=><div key={i} style={{textAlign:"center",padding:10,borderRadius:6,background:C.ac+"06",border:"1px solid "+C.bd}}><div style={{fontSize:9,color:C.td,textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>{m.l}</div><div style={{fontSize:20,fontWeight:800,color:C.tx,marginTop:2}}>{m.v}</div></div>)}</div>
<table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Risk","Score","Owner","Response"].map(h=><Th key={h}>{h}</Th>)}</tr></thead><tbody>{sr.slice(0,5).map(r=>{const sc=r.p*r.i;const scC=sc>=15?C.rd:sc>=8?C.am:C.gn;return<tr key={r.id} style={{borderBottom:"1px solid "+C.bd}}><Td c={C.tx}>{r.d}</Td><td style={{padding:8}}><span style={{color:scC,fontWeight:800,fontSize:13}}>{sc}</span></td><Td>{r.ow||"—"}</Td><td style={{padding:8}}><Bd color={C.ac}>{r.res}</Bd></td></tr>})}</tbody></table>
<div style={{textAlign:"center",fontSize:9,color:C.td,marginTop:16,paddingTop:12,borderTop:"1px solid "+C.bd}}>Auto-generated | PharmaPM Pro v1.2 | AivelloStudio</div>
</div>};

function App(){const[view,setView]=useState("dashboard");const[col,setCol]=useState(false);
const days=useMemo(()=>Math.max(0,Math.ceil((new Date(P.goLive)-new Date())/86400000)),[]);
const health=useMemo(()=>{const hr=RK.some(r=>r.p*r.i>=15&&r.st==="Open");const ha=RK.some(r=>r.p*r.i>=8&&r.st==="Open");return hr?{label:"CRITICAL",color:C.rd,bg:C.rdB}:ha?{label:"AT RISK",color:C.am,bg:C.amB}:{label:"ON TRACK",color:C.gn,bg:C.gnB}},[]);
const nav=[{id:"dashboard",l:"Dashboard",e:"📊"},{id:"steerco",l:"SteerCo Report",e:"📋"},{id:"setup",l:"Project Setup",e:"⚙️"},{id:"milestones",l:"Milestones",e:"🎯"},{id:"tasks",l:"Tasks",e:"✅"},{id:"risks",l:"Risks",e:"⚠️"},{id:"documents",l:"Documents",e:"📄"},{id:"costs",l:"Cost Tracker",e:"💰"}];
const V=()=>{switch(view){case"dashboard":return<Dashboard health={health} days={days}/>;case"steerco":return<SteerCo health={health} days={days}/>;case"setup":return<Setup/>;case"milestones":return<Milestones/>;case"tasks":return<Tasks/>;case"risks":return<Risks/>;case"documents":return<Documents/>;case"costs":return<Costs/>;default:return<Dashboard health={health} days={days}/>}};
return<div style={{display:"flex",height:"100vh",background:C.bg,fontFamily:"'DM Sans',system-ui,sans-serif",overflow:"hidden"}}>
<div style={{width:col?56:200,background:C.sb,borderRight:"1px solid "+C.bd,display:"flex",flexDirection:"column",transition:"width .25s ease",flexShrink:0}}>
<div style={{padding:col?"14px 10px":"16px 14px",borderBottom:"1px solid "+C.bd,cursor:"pointer"}} onClick={()=>setCol(!col)}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,"+C.ac+","+C.tl+")",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:14}}>⚡</div>{!col&&<div><div style={{fontSize:13,fontWeight:800,color:C.tx,lineHeight:1}}>PharmaPM</div><div style={{fontSize:8,color:C.ac,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}}>Pro</div></div>}</div></div>
<div style={{flex:1,padding:6,display:"flex",flexDirection:"column",gap:1}}>{nav.map(n=>{const a=view===n.id;return<div key={n.id} onClick={()=>setView(n.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:6,cursor:"pointer",background:a?C.ac+"12":"transparent",borderLeft:a?"3px solid "+C.ac:"3px solid transparent"}}><span style={{fontSize:14,minWidth:20,textAlign:"center"}}>{n.e}</span>{!col&&<span style={{fontSize:12,fontWeight:a?600:400,color:a?C.ac:C.tm,whiteSpace:"nowrap"}}>{n.l}</span>}</div>})}</div>
{!col&&<div style={{padding:"10px 14px",borderTop:"1px solid "+C.bd,fontSize:8,color:C.td}}>© 2026 AivelloStudio v1.2</div>}
</div>
<div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{padding:"10px 20px",borderBottom:"1px solid "+C.bd,display:"flex",alignItems:"center",justifyContent:"space-between",background:C.sf,flexShrink:0}}><div><h1 style={{margin:0,fontSize:16,fontWeight:800,color:C.tx,letterSpacing:-.5}}>{nav.find(n=>n.id===view)?.l}</h1><div style={{fontSize:10,color:C.td}}>{P.name} — {P.sub}</div></div><div style={{display:"flex",gap:8}}><div style={{padding:"3px 10px",borderRadius:4,background:health.bg,border:"1px solid "+health.color+"30"}}><span style={{fontSize:10,fontWeight:700,color:health.color}}>{health.label}</span></div><div style={{padding:"3px 10px",borderRadius:4,background:C.ac+"10",border:"1px solid "+C.ac+"30"}}><span style={{fontSize:10,fontWeight:600,color:C.ac}}>{days}d</span></div></div></div>
<div style={{flex:1,overflow:"auto",padding:20}}><div style={{maxWidth:1100}}>{V()}</div></div>
</div>
</div>}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
