const RisksView = () => {
  const heatMap = Array(5).fill(null).map(() => Array(5).fill(null).map(() => []));
  RISKS.forEach(r => { heatMap[4 - (r.impact - 1)][r.prob - 1].push(r); });
  const sorted = [...RISKS].sort((a, b) => (b.prob * b.impact) - (a.prob * a.impact));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Section title="Risk Heat Map" icon="shield" color={C.red}>
        <div style={{ display: "grid", gridTemplateColumns: "30px repeat(5, 1fr)", gap: 3 }}>

          {["VL", "L", "M", "H", "VH"].map(l => <div key={l} style={{ textAlign: "center", fontSize: 8, color: C.textDim, fontWeight: 700, padding: 3 }}>{l}</div>)}
          {heatMap.map((row, ri) => (
            <React.Fragment key={ri}>
              <div style={{ fontSize: 8, color: C.textDim, fontWeight: 700, display: "flex", alignItems: "center", justifyContent: "center" }}>{["VH", "H", "M", "L", "VL"][ri]}</div>
              {row.map((cell, ci) => {
                const score = (ci + 1) * (5 - ri);
                const bg = score >= 15 ? `${C.red}20` : score >= 8 ? `${C.amber}15` : `${C.green}10`;
                return (
                  <div key={ci} style={{ background: bg, borderRadius: 6, minHeight: 40, display: "flex", flexWrap: "wrap", gap: 3, padding: 4, alignItems: "center", justifyContent: "center", border: `1px solid ${C.border}` }}>
                    {cell.map(r => (
                      <div key={r.id} title={r.desc} style={{ width: 18, height: 18, borderRadius: "50%", background: r.unforeseen ? "#F97316" : score >= 15 ? C.red : score >= 8 ? C.amber : C.green, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 7, fontWeight: 800, color: "#fff", cursor: "pointer" }}>{r.id.slice(-1)}</div>
                    ))}
                  </div>
                );
              })}
            </React.Fragment>
          ))}
        </div>
        <div style={{ display: "flex", gap: 4, marginTop: 6, justifyContent: "center", fontSize: 8, color: C.textDim }}>← Probability | ↑ Impact</div>
      </Section>

      <Section title="Risk Register" icon="alert-triangle" color={C.amber}>
        {sorted.map(r => {
          const sc = r.prob * r.impact;
          const scC = sc >= 15 ? C.red : sc >= 8 ? C.amber : C.green;
          return (
            <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: 12, borderRadius: 8, marginBottom: 6, background: r.unforeseen ? "rgba(249,115,22,0.05)" : `${C.bg}80`, border: `1px solid ${r.unforeseen ? "rgba(249,115,22,0.2)" : C.border}`, borderLeft: `4px solid ${r.unforeseen ? "#F97316" : scC}` }}>

              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", gap: 6, marginBottom: 3 }}><span style={{ fontSize: 9, fontWeight: 700, color: C.textDim }}>{r.id}</span><Badge color={C.accent}>{r.cat}</Badge>{r.unforeseen && <Badge color="#F97316">Unforeseen</Badge>}</div>

      <div style={{ background: `${C.red}08`, borderRadius: 10, padding: 16, marginBottom: 20, border: `1px solid ${C.red}20` }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.red, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>⚠ Decisions Needed</div>
        {[1, 2, 3].map(i => (<div key={i} style={{ display: "flex", gap: 6, marginBottom: 6 }}><span style={{ minWidth: 20, height: 20, borderRadius: 4, background: `${C.red}15`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: C.red }}>{i}</span><input style={{ flex: 1, background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`, borderRadius: 4, padding: "5px 8px", color: C.text, fontSize: 11, outline: "none" }} placeholder="Enter decision..." /></div>))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 20 }}>
        {[{ l: "Milestones", v: `0/${MILESTONES.length}` }, { l: "Open Risks", v: RISKS.filter(r => r.status === "Open").length }, { l: "Budget", v: `${budgetPct}%` }, { l: "Days Left", v: daysLeft }].map((m, i) => (
          <div key={i} style={{ textAlign: "center", padding: 10, borderRadius: 6, background: `${C.accent}06`, border: `1px solid ${C.border}` }}>
            <div style={{ fontSize: 9, color: C.textDim, textTransform: "uppercase", letterSpacing: 1, fontWeight: 700 }}>{m.l}</div>
            <div style={{ fontSize: 20, fontWeight: 800, color: C.text, marginTop: 2 }}>{m.v}</div>
          </div>
        ))}
      </div>

      <table style={{ width: "100%", borderCollapse: "collapse" }}>
        <thead><tr>{["Risk", "Score", "Owner", "Response"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontSize: 9, color: C.textDim, textTransform: "uppercase", borderBottom: `2px solid ${C.border}`, fontWeight: 700 }}>{h}</th>)}</tr></thead>
        <tbody>{sorted.slice(0, 5).map(r => { const sc = r.prob * r.impact; const scC = sc >= 15 ? C.red : sc >= 8 ? C.amber : C.green; return (
          <tr key={r.id} style={{ borderBottom: `1px solid ${C.border}` }}>
            <td style={{ padding: "8px", fontSize: 11, color: C.text }}>{r.desc}</td>
            <td style={{ padding: "8px" }}><span style={{ color: scC, fontWeight: 800, fontSize: 13 }}>{sc}</span></td>
            <td style={{ padding: "8px", fontSize: 11, color: C.textMuted }}>{r.owner || "—"}</td>
            <td style={{ padding: "8px" }}><Badge color={C.accent}>{r.response}</Badge></td>
          </tr>);
        })}</tbody>
      </table>
      <div style={{ textAlign: "center", fontSize: 9, color: C.textDim, marginTop: 16, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>Auto-generated • PharmaPM Pro v1.2 • AivelloStudio</div>
    </div>
  );
};

// ============================================================
// APP
// ============================================================
function App() {
  const [view, setView] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);

  const daysLeft = useMemo(() => Math.max(0, Math.ceil((new Date(PROJECT.goLive) - new Date()) / 86400000)), []);
  const health = useMemo(() => {
    const hasRed = RISKS.some(r => r.prob * r.impact >= 15 && r.status === "Open");
    const hasAmber = RISKS.some(r => r.prob * r.impact >= 8 && r.status === "Open");
    return hasRed ? { label: "CRITICAL", color: C.red, bg: C.redBg } : hasAmber ? { label: "AT RISK", color: C.amber, bg: C.amberBg } : { label: "ON TRACK", color: C.green, bg: C.greenBg };
  }, []);

  const nav = [
    { id: "dashboard", icon: "layout-dashboard", label: "Dashboard" },
    { id: "steerco", icon: "eye", label: "SteerCo Report" },
    { id: "setup", icon: "settings", label: "Project Setup" },
    { id: "milestones", icon: "target", label: "Milestones" },
    { id: "tasks", icon: "check-square", label: "Tasks" },
    { id: "risks", icon: "alert-triangle", label: "Risks" },
    { id: "documents", icon: "file-text", label: "Documents" },
    { id: "costs", icon: "dollar-sign", label: "Cost Tracker" },
  ];

  const renderView = () => {
    switch (view) {
      case "dashboard": return <DashboardView health={health} daysLeft={daysLeft} />;
      case "steerco": return <SteerCoView health={health} daysLeft={daysLeft} />;
      case "setup": return <SetupView />;
      case "milestones": return <MilestonesView />;
      case "tasks": return <TasksView />;
      case "risks": return <RisksView />;
      case "documents": return <DocumentsView />;
      case "costs": return <CostsView />;
      default: return <DashboardView health={health} daysLeft={daysLeft} />;
    }
  };

  return (
    <div style={{ display: "flex", height: "100vh", background: C.bg, fontFamily: "'DM Sans', system-ui, sans-serif", overflow: "hidden" }}>
      {/* Sidebar */}
      <div style={{ width: collapsed ? 56 : 200, background: C.sidebar, borderRight: `1px solid ${C.border}`, display: "flex", flexDirection: "column", transition: "width 0.25s ease", flexShrink: 0 }}>
        <div style={{ padding: collapsed ? "14px 10px" : "16px 14px", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }} onClick={() => setCollapsed(!collapsed)}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ width: 28, height: 28, borderRadius: 6, background: `linear-gradient(135deg, ${C.accent}, ${C.teal})`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="zap" size={14} color="#fff" /></div>
            {!collapsed && <div><div style={{ fontSize: 13, fontWeight: 800, color: C.text, lineHeight: 1 }}>PharmaPM</div><div style={{ fontSize: 8, color: C.accent, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase" }}>Pro</div></div>}
          </div>
        </div>
        <div style={{ flex: 1, padding: 6, display: "flex", flexDirection: "column", gap: 1 }}>
          {nav.map(n => {
            const active = view === n.id;
            return (
              <div key={n.id} onClick={() => setView(n.id)} style={{ display: "flex", alignItems: "center", gap: 8, padding: collapsed ? "8px 10px" : "8px 10px", borderRadius: 6, cursor: "pointer", background: active ? `${C.accent}12` : "transparent", borderLeft: active ? `3px solid ${C.accent}` : "3px solid transparent" }}>
                <Icon name={n.icon} size={16} color={active ? C.accent : C.textDim} />
                {!collapsed && <span style={{ fontSize: 12, fontWeight: active ? 600 : 400, color: active ? C.accent : C.textMuted, whiteSpace: "nowrap" }}>{n.label}</span>}
              </div>
            );
          })}
        </div>
        {!collapsed && <div style={{ padding: "10px 14px", borderTop: `1px solid ${C.border}`, fontSize: 8, color: C.textDim }}>© 2026 AivelloStudio • v1.2</div>}
      </div>

      {/* Main */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: "10px 20px", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", background: C.surface, flexShrink: 0 }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 16, fontWeight: 800, color: C.text, letterSpacing: -0.5 }}>{nav.find(n => n.id === view)?.label}</h1>
            <div style={{ fontSize: 10, color: C.textDim }}>{PROJECT.name} — {PROJECT.subtitle}</div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ padding: "3px 10px", borderRadius: 4, background: health.bg, border: `1px solid ${health.color}30` }}><span style={{ fontSize: 10, fontWeight: 700, color: health.color }}>{health.label}</span></div>
            <div style={{ padding: "3px 10px", borderRadius: 4, background: `${C.accent}10`, border: `1px solid ${C.accent}30` }}><span style={{ fontSize: 10, fontWeight: 600, color: C.accent }}>{daysLeft}d</span></div>
          </div>
        </div>
        <div style={{ flex: 1, overflow: "auto", padding: 20 }}>
          <div style={{ maxWidth: 1100 }}>{renderView()}</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
