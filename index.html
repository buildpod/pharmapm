<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--surface:#f9fafb;--surface2:#f1f5f9;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--text2:#6b7280;--text3:#9ca3af;--accent:#2563eb;--accent-light:#eff6ff;--green:#10b981;--green-bg:rgba(16,185,129,.1);--amber:#f59e0b;--amber-bg:rgba(245,158,11,.1);--red:#ef4444;--red-bg:rgba(239,68,68,.1);--blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);--orange:#f97316;--input-bg:#fef9c3;--sidebar-bg:#1e293b;--sidebar-text:#94a3b8;--sidebar-active:#e2e8f0;--row-h:34px;--font:'DM Sans',system-ui,sans-serif;--grid-font:system-ui,-apple-system,sans-serif}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--bg)}
.app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:220px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.sidebar-brand{padding:16px;font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-brand span{color:var(--accent)}
.sidebar-nav{flex:1;padding:8px;overflow-y:auto}
.nav-section{font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:12px 12px 4px;color:var(--text3);font-weight:600}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap;overflow:hidden}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(255,255,255,.1);color:var(--sidebar-active)}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-footer button{width:100%;padding:8px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-title{font-size:14px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--text2)}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:4px;font-size:18px}
.topbar-right{display:flex;align-items:center;gap:8px}
.health-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.health-green{background:var(--green-bg);color:var(--green)}
.health-amber{background:var(--amber-bg);color:var(--amber)}
.health-red{background:var(--red-bg);color:var(--red)}
.topbar-btn{padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);font-size:12px;cursor:pointer;font-weight:500}
.topbar-btn:hover{background:var(--surface)}
.toolbar{display:flex;align-items:center;gap:6px;padding:6px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.toolbar select{font-size:12px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--bg)}
.toolbar-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.add-row-btn{padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer}
.del-row-btn{padding:4px 10px;background:var(--red);color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer}
.content{flex:1;overflow:auto;padding:0}
.grid-wrap{overflow-x:auto;overflow-y:auto;height:100%}
table.grid{width:max-content;min-width:100%;border-collapse:collapse;font-family:var(--grid-font);font-size:13px}
.grid thead{position:sticky;top:0;z-index:10}
.grid th{background:var(--surface2);border-bottom:2px solid var(--border);padding:0 8px;height:30px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);white-space:nowrap;cursor:pointer;user-select:none}
.grid th:hover{background:var(--border)}
.grid th .sort-arrow{margin-left:3px;font-size:9px;opacity:.4}
.grid th.sorted .sort-arrow{opacity:1;color:var(--accent)}
.grid td{padding:0 8px;height:var(--row-h);border-bottom:1px solid var(--border);white-space:nowrap;max-width:250px;overflow:hidden;text-overflow:ellipsis;cursor:default;vertical-align:middle}
.grid tr:hover td{background:var(--surface)}
.grid td.editable{cursor:cell}
.grid td.editable:hover{background:var(--accent-light);outline:1px solid var(--accent)}
.grid td.editing{padding:0;outline:2px solid var(--accent)}
.grid td.editing input,.grid td.editing select{width:100%;height:var(--row-h);padding:0 8px;border:none;outline:none;font-family:var(--grid-font);font-size:13px;background:var(--accent-light)}
.badge{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;line-height:18px}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:var(--surface2);color:var(--text2)}
.grid td.auto{color:var(--text2);font-style:italic}
.grid td.computed{color:var(--text2);background:var(--surface)}
.dashboard{padding:24px;overflow-y:auto;height:100%}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.dash-header h2{font-size:18px;font-weight:800}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi-value{font-size:24px;font-weight:800;margin-top:4px}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:2px}
.dash-section{margin-bottom:20px}
.dash-section h3{font-size:14px;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.risk-table{width:100%;font-size:12px;border-collapse:collapse}
.risk-table td,.risk-table th{padding:6px 10px;border-bottom:1px solid var(--border);text-align:left}
.risk-table th{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase}
.steerco{padding:24px;overflow-y:auto;height:100%;max-width:900px}
.steerco h2{font-size:18px;font-weight:800;margin-bottom:16px}
.steerco-section{margin-bottom:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.steerco-section h4{font-size:12px;font-weight:700;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.steerco-section p{font-size:13px;line-height:1.5}
.decision-input{width:100%;padding:8px;margin-top:4px;border:1px solid var(--border);border-radius:4px;font-size:13px;background:var(--input-bg)}
.steerco-footer{font-size:11px;color:var(--text3);margin-top:16px;font-style:italic}
.comment-panel{position:fixed;right:-360px;top:0;bottom:0;width:360px;background:var(--bg);border-left:1px solid var(--border);box-shadow:-4px 0 12px rgba(0,0,0,.06);z-index:100;transition:right .25s;display:flex;flex-direction:column}
.comment-panel.open{right:0}
.comment-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border)}
.comment-header h3{font-size:14px;font-weight:700}
.comment-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text2)}
.comment-list{flex:1;overflow-y:auto;padding:12px 16px}
.comment-item{margin-bottom:12px;padding:10px;background:var(--surface);border-radius:8px}
.comment-author{font-size:11px;font-weight:600;color:var(--accent)}
.comment-date{font-size:10px;color:var(--text3);margin-left:8px}
.comment-text{font-size:13px;margin-top:4px;line-height:1.4}
.comment-input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.comment-input-wrap input{flex:1;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.comment-input-wrap button{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.save-banner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--sidebar-bg);color:#fff;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s}
.save-banner.show{opacity:1}
.data-banner{background:#fef3c7;border-bottom:1px solid #fcd34d;padding:6px 20px;font-size:12px;color:#92400e;display:flex;align-items:center;gap:8px}
.data-banner button{padding:2px 10px;background:#f59e0b;color:#fff;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer}
@media(max-width:768px){.sidebar{position:fixed;left:-220px;z-index:50;height:100%}.sidebar.open{left:0}.hamburger{display:block}}
</style>

function buildGraph(ms){var g={},ind={};ms.forEach(function(m){g[m.id]=[];ind[m.id]=0});ms.forEach(function(m){if(m.predecessor&&g[m.predecessor]!==undefined){g[m.predecessor].push(m.id);ind[m.id]++}});return{graph:g,inDegree:ind}}
function topoSort(ms){var bg=buildGraph(ms),g=bg.graph,ind=bg.inDegree,q=[],sorted=[];Object.keys(ind).forEach(function(id){if(ind[id]===0)q.push(parseInt(id))});while(q.length>0){var n=q.shift();sorted.push(n);(g[n]||[]).forEach(function(s){ind[s]--;if(ind[s]===0)q.push(s)})}return{sorted:sorted.length===ms.length?sorted:null,hasCycle:sorted.length<ms.length}}
function addWD(date,days){var d=new Date(date);var added=0;while(added<days){d.setDate(d.getDate()+1);var dow=d.getDay();if(dow!==0&&dow!==6)added++}return d}
function fmtD(d){if(!d)return'';var dt=new Date(d);var y=dt.getFullYear(),m=('0'+(dt.getMonth()+1)).slice(-2),day=('0'+dt.getDate()).slice(-2);return y+'-'+m+'-'+day}
function daysBtw(a,b){return Math.round((new Date(b)-new Date(a))/(864e5))}
function findMs(id){return state.milestones.find(function(m){return m.id===id})}
function recalc(){var res=topoSort(state.milestones);if(!res.sorted)return;res.sorted.forEach(function(id){var ms=findMs(id);if(ms.predecessor){var pred=findMs(ms.predecessor);if(pred){var ns=fmtD(addWD(pred.plannedEnd,1+(parseInt(ms.lag)||0)));if(ns>ms.plannedStart||ms.status==='Not Started'){ms.plannedStart=ns;ms.plannedEnd=fmtD(addWD(ms.plannedStart,(parseInt(ms.duration)||1)-1))}}}});var today=fmtD(new Date());state.milestones.forEach(function(ms){ms._delay=ms.status==='Complete'?0:Math.max(0,daysBtw(ms.plannedEnd,today));ms._rag=ms.status==='Complete'?'Green':ms._delay>5?'Red':ms._delay>0?'Amber':'Green'})}

function gDV(t,r,c){if(c.type==='computed'){if(c.key==='_rag')return r._rag||'Green';if(c.key==='_delay')return(r._delay||0)+'d';if(c.key==='_score')return(parseInt(r.prob)||0)*(parseInt(r.impact)||0);if(c.key==='_variance')return(parseInt(r.actHrs)||0)-(parseInt(r.estHrs)||0);if(c.key==='_burn')return r.hours>0?Math.round((r.used/r.hours)*100)+'%':'-';if(c.key==='_cost')return'€'+((parseInt(r.used)||0)*(parseInt(r.rate)||0)).toLocaleString();if(c.key==='_budgetRag'){if(!r.hours)return'-';var burn=r.used/r.hours;return burn>.8?'Red':burn>.5?'Amber':'Green'}}return r[c.key]}
function badgeCls(v){if(v==='Green'||v==='Complete'||v==='Approved')return'badge-green';if(v==='Amber'||v==='In Progress'||v==='In Review'||v==='In Draft'||v==='Monitoring')return'badge-amber';if(v==='Red'||v==='Blocked'||v==='Critical'||v==='Escalated')return'badge-red';if(v==='Not Started'||v==='N/A')return'badge-gray';return'badge-blue'}

function renderGrid(t){var c=cols[t],rows=getRows(t);var h='<div class="grid-wrap"><table class="grid"><thead><tr>';c.forEach(function(col){var sorted=sortState[t]&&sortState[t].col===col.key;var arrow=sorted?(sortState[t].dir==='asc'?'▲':'▼'):'⇅';h+='<th style="width:'+col.w+'px" class="'+(sorted?'sorted':'')+'" onclick="doSort(\''+t+'\',\''+col.key+'\')">'+col.label+'<span class="sort-arrow">'+arrow+'</span></th>'});h+='<th style="width:36px">💬</th></tr></thead><tbody>';rows.forEach(function(row){h+='<tr data-id="'+row.id+'">';c.forEach(function(col){var val=gDV(t,row,col);var cls=col.type==='computed'?'computed':col.type==='auto'?'auto':'editable';var disp=val;if(col.key==='status'||col.key==='_rag'||col.key==='priority'||col.key==='applicability'||col.key==='_budgetRag')disp='<span class="badge '+badgeCls(val)+'">'+(val||'-')+'</span>';else if(col.key==='_score'){var sc=parseInt(val)||0;disp='<span class="badge '+(sc>=15?'badge-red':sc>=8?'badge-amber':'badge-green')+'">'+sc+'</span>'}else if(col.key==='pct')disp=(val||0)+'%';if(col.type!=='computed'&&col.type!=='auto')h+='<td class="'+cls+'" onclick="startEdit(\''+t+'\','+row.id+',\''+col.key+'\')" style="width:'+col.w+'px">'+disp+'</td>';else h+='<td class="'+cls+'" style="width:'+col.w+'px">'+disp+'</td>'});var cc=(state.comments[t+'_'+row.id]||[]).length;h+='<td style="cursor:pointer;text-align:center" onclick="openComments(\''+t+'\','+row.id+')">'+(cc>0?'💬'+cc:'○')+'</td></tr>'});h+='</tbody></table></div>';return h}

function startEdit(t,id,key){var row=state[t].find(function(r){return r.id===id});if(!row)return;var col=cols[t].find(function(c){return c.key===key});if(!col||col.type==='auto'||col.type==='computed')return;var tr=document.querySelector('tr[data-id="'+id+'"]');if(!tr)return;var ci=cols[t].findIndex(function(c){return c.key===key});var td=tr.children[ci];if(!td||td.classList.contains('editing'))return;td.classList.add('editing');var val=row[key]||'';if(col.type==='dropdown'){var h='<select onchange="commitEdit(\''+t+'\','+id+',\''+key+'\',this.value)" onblur="commitEdit(\''+t+'\','+id+',\''+key+'\',this.value)">';(col.options||[]).forEach(function(o){h+='<option value="'+o+'"'+(val==o?' selected':'')+'>'+o+'</option>'});td.innerHTML=h+'</select>';td.querySelector('select').focus()}else{var it=col.type==='date'?'date':col.type==='number'?'number':'text';td.innerHTML='<input type="'+it+'" value="'+val+'" onblur="commitEdit(\''+t+'\','+id+',\''+key+'\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur();if(event.key===\'Escape\'){this.dataset.cancel=\'1\';this.blur()}">';var inp=td.querySelector('input');inp.focus();if(it==='text')inp.select()}}
function commitEdit(t,id,key,val){if(event&&event.target&&event.target.dataset&&event.target.dataset.cancel==='1')return render();var row=state[t].find(function(r){return r.id===id});if(!row)return;var col=cols[t].find(function(c){return c.key===key});if(col&&col.type==='number')val=val===''?null:parseInt(val);if(col&&col.key==='unforeseen')val=val==='true';row[key]=val;if(t==='milestones'&&(key==='plannedStart'||key==='plannedEnd'||key==='duration'||key==='predecessor'||key==='lag'))recalc();render();autoSave()}
function addRow(t){var arr=state[t];var mx=arr.reduce(function(m,r){return Math.max(m,r.id)},0);var nr={id:mx+1};cols[t].forEach(function(c){if(c.type!=='computed'&&c.type!=='auto')nr[c.key]=c.type==='number'?0:c.type==='date'?fmtD(new Date()):''});nr.id=mx+1;arr.push(nr);render();autoSave()}
function doSort(t,col){if(!sortState[t]||sortState[t].col!==col)sortState[t]={col:col,dir:'asc'};else if(sortState[t].dir==='asc')sortState[t].dir='desc';else sortState[t]=null;render()}

function getRows(t){var rows=state[t].slice();var f=filterState[t]||{};Object.keys(f).forEach(function(c){rows=rows.filter(function(r){return String(r[c])===f[c]})});var s=sortState[t];if(s)rows.sort(function(a,b){var va=a[s.col],vb=b[s.col];if(va==null)return 1;if(vb==null)return-1;if(typeof va==='number')return s.dir==='asc'?va-vb:vb-va;return s.dir==='asc'?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va))});return rows}

function renderDashboard(){var ms=state.milestones,ts=state.tasks,rs=state.risks,ds=state.documents,cs=state.costs;var msC=ms.filter(function(m){return m.status==='Complete'}).length;var tsC=ts.filter(function(t){return t.status==='Complete'}).length;var oR=rs.filter(function(r){return r.status==='Open'||r.status==='Monitoring'}).length;var cR=rs.filter(function(r){return(parseInt(r.prob)||0)*(parseInt(r.impact)||0)>=15}).length;var dA=ds.filter(function(d){return d.status==='Approved'}).length;var dR=ds.filter(function(d){return d.applicability==='Required'}).length;var tB=cs.reduce(function(s,c){return s+(c.hours||0)*(c.rate||0)},0);var tU=cs.reduce(function(s,c){return s+(c.used||0)*(c.rate||0)},0);var bP=tB>0?Math.round(tU/tB*100):0;var dtg=daysBtw(fmtD(new Date()),state.meta.goLive);var health='Green';if(ms.some(function(m){return m._rag==='Red'})||cR>0)health='Red';else if(ms.some(function(m){return m._rag==='Amber'})||bP>90)health='Amber';var h='<div class="dashboard"><div class="dash-header"><h2>'+state.meta.name+'</h2><span class="health-badge health-'+health.toLowerCase()+'">● '+health.toUpperCase()+'</span></div><div class="kpi-row">';h+=kpi('Milestones',msC+'/'+ms.length,Math.round(msC/ms.length*100)+'%');h+=kpi('Tasks',tsC+'/'+ts.length,Math.round(ts.length>0?tsC/ts.length*100:0)+'%');h+=kpi('Open Risks',oR,cR+' critical');h+=kpi('Budget',bP+'%','€'+tU.toLocaleString()+' / €'+tB.toLocaleString());h+=kpi('Documents',dA+'/'+dR,Math.round(dR>0?dA/dR*100:0)+'% ready');h+=kpi('Go-Live',dtg+'d',state.meta.goLive);h+='</div>';h+='<div class="dash-section"><h3>Milestone Progress</h3><table class="risk-table"><tr><th>Phase</th><th>Milestone</th><th>Status</th><th>Plan End</th><th>RAG</th></tr>';ms.forEach(function(m){h+='<tr><td>'+m.phase+'</td><td>'+m.name+'</td><td><span class="badge '+badgeCls(m.status)+'">'+m.status+'</span></td><td>'+m.plannedEnd+'</td><td><span class="badge '+badgeCls(m._rag||'Green')+'">'+(m._rag||'Green')+'</span></td></tr>'});h+='</table></div>';var topR=rs.filter(function(r){return r.status!=='Closed'}).sort(function(a,b){return(b.prob*b.impact)-(a.prob*a.impact)}).slice(0,5);h+='<div class="dash-section"><h3>Top 5 Risks</h3><table class="risk-table"><tr><th>Risk</th><th>Score</th><th>Status</th><th>Owner</th></tr>';topR.forEach(function(r){var sc=r.prob*r.impact;h+='<tr><td>'+r.desc.substring(0,60)+'</td><td><span class="badge '+(sc>=15?'badge-red':sc>=8?'badge-amber':'badge-green')+'">'+sc+'</span></td><td>'+r.status+'</td><td>'+r.owner+'</td></tr>'});h+='</table></div>';h+='<div class="dash-section"><h3>Vendor Budget</h3><table class="risk-table"><tr><th>Vendor</th><th>Used/Total</th><th>Burn %</th><th>Cost €</th></tr>';cs.forEach(function(c){var burn=c.hours>0?Math.round(c.used/c.hours*100):0;var cost=(c.used||0)*(c.rate||0);h+='<tr><td>'+c.vendor+'</td><td>'+c.used+'/'+c.hours+'</td><td><span class="badge '+(burn>80?'badge-red':burn>50?'badge-amber':'badge-green')+'">'+burn+'%</span></td><td>€'+cost.toLocaleString()+'</td></tr>'});h+='</table></div></div>';return h}
function kpi(l,v,s){return'<div class="kpi"><div class="kpi-label">'+l+'</div><div class="kpi-value">'+v+'</div><div class="kpi-sub">'+s+'</div></div>'}

function renderSteerCo(){var ms=state.milestones,rs=state.risks;var health='Green';if(ms.some(function(m){return m._rag==='Red'}))health='Red';else if(ms.some(function(m){return m._rag==='Amber'}))health='Amber';var today=fmtD(new Date());var h='<div class="steerco"><h2>SteerCo Report — '+state.meta.name+'</h2><p style="font-size:12px;color:var(--text2)">Report Date: '+today+' | PM: '+state.meta.pm+' | Status: <span class="badge badge-'+health.toLowerCase()+'">'+health+'</span></p>';var comp=ms.filter(function(m){return m.status==='Complete'});h+='<div class="steerco-section"><h4>Completed</h4>';if(comp.length===0)h+='<p>No milestones completed yet.</p>';comp.forEach(function(m){h+='<p>✓ '+m.name+' ('+m.phase+')</p>'});h+='</div>';var ip=ms.filter(function(m){return m.status==='In Progress'});h+='<div class="steerco-section"><h4>In Progress</h4>';ip.forEach(function(m){h+='<p>→ '+m.name+' — '+m.pct+'% (target: '+m.plannedEnd+')</p>'});if(ip.length===0)h+='<p>None.</p>';h+='</div>';var up=ms.filter(function(m){return m.status==='Not Started'}).slice(0,5);h+='<div class="steerco-section"><h4>Upcoming</h4>';up.forEach(function(m){h+='<p>○ '+m.name+' — '+m.plannedStart+' to '+m.plannedEnd+'</p>'});h+='</div>';var topR=rs.filter(function(r){return r.status!=='Closed'}).sort(function(a,b){return(b.prob*b.impact)-(a.prob*a.impact)}).slice(0,5);h+='<div class="steerco-section"><h4>Key Risks</h4>';topR.forEach(function(r){h+='<p>⚠ ['+r.category+'] '+r.desc.substring(0,80)+' — Score: '+(r.prob*r.impact)+'</p>'});h+='</div>';h+='<div class="steerco-section"><h4>Decisions Needed</h4>';state.steerco.decisions.forEach(function(d,i){h+='<input class="decision-input" placeholder="Decision '+(i+1)+'..." value="'+(d||'')+'" onchange="state.steerco.decisions['+i+']=this.value;autoSave()">'});h+='</div><div class="steerco-footer">Auto-generated by PharmaPM Pro | '+today+'</div></div>';return h}

function navigate(v){currentView=v;document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});var a=document.querySelector('[data-view="'+v+'"]');if(a)a.classList.add('active');document.getElementById('sidebar').classList.remove('open');render()}
function render(){recalc();var content=document.getElementById('content'),toolbar=document.getElementById('toolbarArea'),title=document.getElementById('viewTitle');var titles={milestones:'Milestones',tasks:'Tasks',risks:'Risks & Blockers',documents:'Document Checklist',costs:'Cost & Vendor Tracker',dashboard:'Dashboard',steerco:'SteerCo Report'};title.textContent=titles[currentView]||currentView;document.getElementById('projectName').textContent=state.meta.name;var health='Green';if(state.milestones.some(function(m){return m._rag==='Red'}))health='Red';else if(state.milestones.some(function(m){return m._rag==='Amber'}))health='Amber';var hb=document.getElementById('healthBadge');hb.className='health-badge health-'+health.toLowerCase();hb.textContent='● '+health;document.getElementById('goLiveDays').textContent=daysBtw(fmtD(new Date()),state.meta.goLive)+'d to Go-Live';if(currentView==='dashboard'){toolbar.innerHTML='';content.innerHTML=renderDashboard()}else if(currentView==='steerco'){toolbar.innerHTML='';content.innerHTML=renderSteerCo()}else{toolbar.innerHTML=renderToolbar(currentView);content.innerHTML=renderGrid(currentView)}}

(function(){var saved=dataLayer.load();if(saved&&saved.schemaVersion)state=saved;recalc();render();autoSave()})();
</script>
